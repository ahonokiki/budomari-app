<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>枝重 すばやく入力（テスト）</title>
<style>
  :root{--bg:#f0f2f5;--card:#fff;--accent:#1a3a6b;--accent2:#2e5ca8;--text:#1a1a2e;--muted:#6b7a99;--border:#dde3ef;--green:#1a7a4a;--red:#c0392b;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
  html,body{height:100%;}
  body{font-family:-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);
       height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
  header{flex:0 0 auto;background:var(--accent);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;}
  header h1{font-size:15px;font-weight:700;}
  header .clr{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;}
  main{flex:1 1 auto;min-height:0;max-width:480px;width:100%;margin:0 auto;padding:8px 12px 10px;display:flex;flex-direction:column;gap:7px;}
  /* 合計 */
  .total{flex:0 0 auto;background:var(--card);border-radius:14px;padding:10px;text-align:center;box-shadow:0 2px 8px rgba(26,58,107,.08);}
  .total .v{font-size:32px;font-weight:900;color:var(--accent);line-height:1.05;}
  .total .v small{font-size:15px;color:var(--muted);font-weight:700;}
  .total .cnt{font-size:11px;color:var(--muted);}
  /* チップ欄：3行分の固定スペース（増えても高さ不変・中だけスクロール） */
  .chips{flex:0 0 auto;height:116px;overflow-y:auto;-webkit-overflow-scrolling:touch;
         display:flex;flex-wrap:wrap;align-content:flex-start;gap:6px;
         background:#fbfcfe;border:1px dashed var(--border);border-radius:10px;padding:7px;}
  .chip{background:#e8eef8;color:var(--accent);border-radius:8px;padding:5px 9px;font-size:15px;font-weight:700;height:30px;}
  .chips:empty::before{content:'枝重がここに並びます（タップで1頭削除）';color:#bcc6d8;font-size:12px;font-weight:500;}
  /* 入力中 */
  .buffer{flex:0 0 auto;background:var(--card);border:2px solid var(--accent2);border-radius:10px;
          padding:8px 14px;font-size:26px;font-weight:800;text-align:right;min-height:48px;line-height:1.2;}
  .buffer .ph{color:#c0cadb;font-size:15px;font-weight:500;}
  /* キーパッド */
  .kp{flex:0 0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
  .key{background:var(--card);border:none;border-radius:11px;padding:13px 0;font-size:23px;font-weight:700;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08);}
  .key:active{background:#eef1f7;transform:scale(.97);}
  .key.del{color:var(--red);}
  .key.small{font-size:13px;}
  .commit{flex:0 0 auto;display:grid;grid-template-columns:1fr 1fr;gap:7px;}
  .cbtn{border:none;border-radius:12px;padding:12px 0;font-size:19px;font-weight:800;color:#fff;}
  .cbtn.h5{background:var(--accent2);}
  .cbtn.h0{background:var(--green);}
  .cbtn:active{transform:scale(.98);filter:brightness(.95);}
  .cbtn small{display:block;font-size:10px;font-weight:600;opacity:.9;margin-top:1px;}
</style>
</head>
<body>
<header>
  <h1>⚖️ 枝重 すばやく入力（テスト）</h1>
  <button class="clr" id="clr">全クリア</button>
</header>
<main>
  <div class="total"><div class="v" id="total">0.0<small> kg</small></div><div class="cnt" id="cnt">0 頭</div></div>
  <div class="chips" id="chips"></div>
  <div class="buffer" id="buffer"><span class="ph">数字を入力…</span></div>
  <div class="kp">
    <button class="key" data-d="7">7</button><button class="key" data-d="8">8</button><button class="key" data-d="9">9</button>
    <button class="key" data-d="4">4</button><button class="key" data-d="5">5</button><button class="key" data-d="6">6</button>
    <button class="key" data-d="1">1</button><button class="key" data-d="2">2</button><button class="key" data-d="3">3</button>
    <button class="key del" id="del">⌫</button><button class="key" data-d="0">0</button><button class="key del small" id="delItem">頭↩︎削除</button>
  </div>
  <div class="commit">
    <button class="cbtn h5" id="c5">.（.5）<small>5は不要・押すと次へ</small></button>
    <button class="cbtn h0" id="c0">✓（.0）<small>そのまま・押すと次へ</small></button>
  </div>
</main>
<script>
  var buf='', items=[];
  var bufEl=document.getElementById('buffer'), totalEl=document.getElementById('total'),
      cntEl=document.getElementById('cnt'), chipsEl=document.getElementById('chips');

  function render(){
    bufEl.innerHTML = (buf==='') ? '<span class="ph">数字を入力…</span>' : buf;
    var sum=0; for(var i=0;i<items.length;i++) sum+=items[i];
    totalEl.innerHTML = sum.toFixed(1)+'<small> kg</small>';
    cntEl.textContent = items.length+' 頭';
    chipsEl.innerHTML = items.map(function(v,i){return '<span class="chip" data-i="'+i+'">'+v.toFixed(1)+'</span>';}).join('');
    chipsEl.scrollTop = chipsEl.scrollHeight;   // 最新を見せる
  }
  function commit(frac){
    if(buf==='') return;
    var n=parseInt(buf,10);
    if(!isNaN(n)) items.push(n+frac);
    buf=''; render();
    if(navigator.vibrate) navigator.vibrate(12);
  }
  document.querySelectorAll('.key[data-d]').forEach(function(k){
    k.addEventListener('click', function(){ if(buf.length<3) buf+=this.getAttribute('data-d'); render(); });
  });
  document.getElementById('del').addEventListener('click', function(){ buf=buf.slice(0,-1); render(); });
  document.getElementById('delItem').addEventListener('click', function(){ if(buf!==''){buf='';} else {items.pop();} render(); });
  document.getElementById('c5').addEventListener('click', function(){ commit(0.5); });
  document.getElementById('c0').addEventListener('click', function(){ commit(0.0); });
  document.getElementById('clr').addEventListener('click', function(){ items=[]; buf=''; render(); });
  chipsEl.addEventListener('click', function(e){
    var c=e.target.closest('.chip'); if(c){ items.splice(parseInt(c.getAttribute('data-i'),10),1); render(); }
  });
  render();
</script>
</body>
</html>
